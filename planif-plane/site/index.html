<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlideX — Planif Plané</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root{
    /* couleurs vives : carte + bloc instrument sombre */
    --signal:#f2a23d; --wind:#43ccd6; --danger:#e5544d; --ok:#79d29a;
    /* encres foncées : texte sur fond clair */
    --signal-ink:#b36c0a; --wind-ink:#0d7f8b; --danger-ink:#c0392f; --ok-ink:#1e8a52;
    --bg:#eef1ef; --card:#ffffff; --edge:#dde3e0; --edge-strong:#c3cdc8;
    --ink:#1c2b26; --muted:#5a6b64; --faint:#8b9a93;
    --instrument:#101b17; --instrument-2:#16241f; --instrument-edge:#24382f;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .app{display:flex;flex-direction:column;height:100vh;height:100dvh}

  .topbar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--card);
    border-bottom:1px solid var(--edge);flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:9px}
  .logo .mark{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#f2a23d,#e07b1f);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px}
  .topbar h1{font-size:16px;font-weight:700;margin:0;letter-spacing:.2px}
  .topbar .tag{font-size:11px;color:var(--signal-ink);border:1px solid #f0d9b8;background:#fdf6ec;
    border-radius:100px;padding:2px 10px;letter-spacing:.4px}
  .topbar .hint{font-size:12px;color:var(--muted);margin-left:auto}
  .langbtn{border:1px solid var(--edge-strong);background:#fff;color:var(--ink);
    font-size:11.5px;font-weight:700;border-radius:8px;padding:4px 10px;cursor:pointer}
  .langbtn:hover{border-color:var(--signal)}

  .main{display:flex;flex:1;min-height:0}
  .side{width:372px;overflow-y:auto;padding:12px;flex-shrink:0;background:var(--bg)}
  #map{flex:1;min-height:0;background:#0a1210}
  @media(max-width:800px){
    .main{flex-direction:column}
    .side{width:100%;order:2}
    #map{order:1;height:50vh;flex:none}
  }

  .card{background:var(--card);border:1px solid var(--edge);border-radius:13px;
    padding:12px 13px 11px;margin-bottom:10px;box-shadow:0 1px 2px rgba(20,40,32,.05)}
  .card-head{display:flex;align-items:center;gap:8px;margin:0 0 10px}
  .card-head .num{width:19px;height:19px;border-radius:50%;background:var(--ink);color:#fff;
    font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .card-head h2{font-size:13px;font-weight:700;margin:0;letter-spacing:.3px}
  .card-head .sub{font-size:11px;color:var(--faint);margin-left:auto;text-align:right}
  .card-head .sub.mono{font-family:var(--mono);color:var(--wind-ink)}
  .card-head .sub.mono small{color:var(--faint)}

  label{display:flex;align-items:center;justify-content:space-between;gap:6px;
    font-size:12px;font-weight:600;color:var(--muted);margin:0 0 4px;white-space:nowrap}
  label .unit{font-family:var(--mono);font-size:9.5px;font-weight:400;color:var(--faint);
    text-transform:uppercase;letter-spacing:.4px;background:var(--bg);border-radius:4px;padding:1px 4px;flex-shrink:0}
  .field{margin-bottom:9px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
  .side input,.side select{width:100%;background:#fff;border:1px solid var(--edge-strong);border-radius:9px;
    color:var(--ink);font-family:var(--mono);font-size:14px;padding:8px 10px;outline:none;
    transition:border-color .12s, box-shadow .12s}
  .side select{font-family:var(--sans);font-size:13px}
  .side input:focus,.side select:focus{border-color:var(--signal);box-shadow:0 0 0 3px rgba(242,162,61,.18)}

  .est{font-size:11.5px;color:var(--faint);margin:2px 0 9px;line-height:1.5}
  .est b{color:var(--wind-ink);font-weight:650}
  .warn{font-size:12px;color:var(--danger-ink);background:#fdf0ef;border:1px solid #f3cfcc;
    border-radius:8px;padding:7px 10px;margin:6px 0 0;line-height:1.45}

  details{background:var(--bg);border:1px solid var(--edge);border-radius:10px;padding:8px 11px;margin-top:2px}
  summary{font-size:12px;font-weight:600;color:var(--wind-ink);cursor:pointer}
  details .est{margin-top:8px}
  details.footnote{background:transparent;border:none;padding:4px 4px 12px;margin-top:0}
  details.footnote summary{color:var(--faint);font-weight:500}
  details.footnote .est{margin:6px 0 0}

  .wind-grid{display:grid;grid-template-columns:auto 1fr 1fr;gap:10px;align-items:end}
  .wind-grid svg{cursor:pointer;touch-action:none;background:var(--bg);border-radius:50%;display:block}

  .chk{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-top:2px}
  .chk input{width:auto;accent-color:var(--signal)}

  /* approche & atterrissage */
  .okmsg{font-size:12px;color:var(--ok-ink);background:#eef8f1;border:1px solid #cde8d6;
    border-radius:8px;padding:7px 10px;margin:6px 0 0;line-height:1.45}
  .gates{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;line-height:1.9}
  .gates div{display:flex;justify-content:space-between;gap:8px}
  .gates b{color:var(--ink);font-weight:600;font-family:var(--sans);font-size:11.5px}
  .gates .val{color:var(--wind-ink);white-space:nowrap}
  .gate{background:rgba(16,27,23,.92);color:#e9efeb;font:10.5px/1.3 ui-monospace,Menlo,Consolas,monospace;
    padding:2px 7px;border-radius:100px;border:1px solid #24382f;white-space:nowrap;
    display:inline-block;transform:translate(-50%,-150%)}

  /* bloc résultat : instrument sombre */
  .card.results{background:var(--instrument);border-color:var(--instrument-edge)}
  .card.results .card-head h2{color:#e9efeb}
  .card.results .card-head .num{background:var(--signal);color:#20140a}
  .readout{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--instrument-edge);
    border:1px solid var(--instrument-edge);border-radius:10px;overflow:hidden}
  .cell{background:var(--instrument-2);padding:7px 10px}
  .cell .k{font-size:9px;color:#7f958d;letter-spacing:.3px;text-transform:uppercase;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cell .v{font-family:var(--mono);font-size:15px;color:var(--signal);line-height:1.1;white-space:nowrap}
  .cell .v small{font-size:10px;color:#5d6f67}
  .cell.arr{grid-column:1/-1;background:#0d1713}
  .cell.arr .v{font-size:20px;white-space:normal}
  .cell.arr.bad .v{color:var(--danger);font-size:14.5px}
  .cell.arr.good .v{color:var(--ok)}
  .cell.arr .verdict{font-family:var(--sans);font-size:11px;margin-top:4px;color:#7f958d;line-height:1.4}
  .cell.arr .relief{font-family:var(--mono);font-size:11px;margin-top:3px;line-height:1.4}
  .cell.wind .v{color:var(--wind)}

  .legs{font-family:var(--mono);font-size:10.5px;color:#9fb2a9;margin-top:8px;line-height:1.7}
  .legs div{display:flex;justify-content:space-between;gap:8px}
  .legs b{color:#cfdad4;font-weight:600}

  .ptlist{margin-top:8px;font-family:var(--mono);font-size:10.5px;color:#9fb2a9;max-height:96px;overflow-y:auto}
  .ptlist .pt{display:flex;align-items:center;gap:7px;padding:2px 0;cursor:pointer}
  .ptlist .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .ptlist .lbl{color:#cfdad4;font-weight:600;min-width:44px}
  .ptlist .co{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ptlist .ptdel{margin-left:auto;background:none;border:none;color:var(--danger);cursor:pointer;
    font-size:14px;line-height:1;padding:2px 6px;border-radius:6px}
  .ptlist .ptdel:hover{background:rgba(229,84,77,.15);border:none}

  .btns{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
  button{font-family:var(--sans);font-size:12.5px;font-weight:600;cursor:pointer;
    border:1px solid var(--instrument-edge);background:transparent;color:#cfdad4;border-radius:9px;padding:7px 13px}
  button.primary{background:var(--signal);color:#20140a;border-color:var(--signal)}
  button:hover{border-color:var(--signal)}
  #calBtn{border-color:var(--edge-strong);color:var(--ink);background:#fff;width:100%;margin-top:2px}
  #calBtn:hover{border-color:var(--signal)}

  .maptip{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:500;
    background:rgba(16,27,23,.92);border-radius:100px;
    padding:7px 16px;font-size:12.5px;color:#e9efeb;pointer-events:none;transition:opacity .3s}
  .leaflet-container{background:#0a1210}
  .leaflet-control-layers label{display:block;font-size:13px;color:#1c2b26;white-space:nowrap;margin:2px 0}

  /* profil de terrain */
  #profWrap{position:absolute;left:10px;right:10px;bottom:10px;z-index:600;display:none;
    background:rgba(16,27,23,.94);border:1px solid var(--instrument-edge);border-radius:12px;padding:7px 10px 5px}
  .prof-head{display:flex;align-items:center;gap:10px;font-size:11px;margin-bottom:3px}
  .prof-head .t{font-weight:600;color:#cfdad4}
  .prof-head #profStatus{margin-left:auto;font-family:var(--mono);font-size:11px}
  #profClose{background:none;border:none;color:#7f958d;font-size:15px;padding:0 3px;line-height:1;cursor:pointer}
  #prof{display:block;width:100%;height:92px}
  #profToggle{position:absolute;left:10px;bottom:10px;z-index:600;display:none;
    background:rgba(16,27,23,.92);border:1px solid var(--instrument-edge);color:#cfdad4;font-size:12px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo"><div class="mark">G</div><h1>GlideX</h1></div>
    <span class="tag" data-i18n="tag"></span>
    <span class="hint" data-i18n="hint"></span>
    <button class="langbtn" id="langBtn" title="Français / English">FR</button>
  </div>

  <div class="main">
    <div class="side">

      <section class="card">
        <div class="card-head"><span class="num">1</span><h2 data-i18n="wing_h"></h2></div>
        <div class="row2">
          <div class="field"><label><span data-i18n="model"></span></label><select id="wing"></select></div>
          <div class="field"><label><span data-i18n="size"></span> <span class="unit">m²</span></label><select id="size"></select></div>
        </div>
        <div class="row3">
          <div class="field"><label><span data-i18n="f_best"></span> <span class="unit">L/D</span></label><input type="number" id="glide" step="0.1" min="1"></div>
          <div class="field"><label><span data-i18n="f_plan"></span> <span class="unit">L/D</span></label><input type="number" id="glideMin" step="0.1" min="1"></div>
          <div class="field"><label><span data-i18n="speed"></span> <span class="unit">km/h</span></label><input type="number" id="vspeed" step="1" min="10"></div>
        </div>
        <details>
          <summary data-i18n="help_sum"></summary>
          <p class="est" id="wingEst"></p>
          <p class="est" data-i18n="help1"></p>
          <p class="est" data-i18n="help2"></p>
          <div class="row2">
            <div class="field"><label><span data-i18n="cal_d"></span> <span class="unit">m</span></label><input type="number" id="calD" data-i18n-ph="ph_ex"></div>
            <div class="field"><label><span data-i18n="cal_h"></span> <span class="unit">m</span></label><input type="number" id="calH" data-i18n-ph="ph_ex2"></div>
          </div>
          <div class="field"><label><span data-i18n="cal_v"></span> <span class="unit">km/h</span></label><input type="number" id="calV" data-i18n-ph="ph_opt"></div>
          <button id="calBtn" data-i18n="cal_btn"></button>
        </details>
      </section>

      <section class="card">
        <div class="card-head"><span class="num">2</span><h2 data-i18n="wind_h"></h2><span class="sub mono" id="roseTxt">—</span></div>
        <div class="wind-grid">
          <svg id="rose" width="82" height="82" viewBox="0 0 82 82"></svg>
          <div class="field" style="margin:0"><label><span data-i18n="force"></span> <span class="unit">kt</span></label>
            <input type="number" id="wind" value="10" step="1" min="0"></div>
          <div class="field" style="margin:0"><label><span data-i18n="from"></span> <span class="unit" data-i18n="true_deg"></span></label>
            <input type="number" id="wdir" value="270" step="5"></div>
        </div>
        <p class="warn" id="windWarn" style="display:none" data-i18n="windwarn"></p>
      </section>

      <section class="card">
        <div class="card-head"><span class="num">3</span><h2 data-i18n="alt_h"></h2></div>
        <div class="row3">
          <div class="field"><label><span data-i18n="start_alt"></span> <span class="unit">m</span></label><input type="number" id="alt" value="700" step="10"></div>
          <div class="field"><label><span data-i18n="gnd"></span> <span class="unit">m</span></label><input type="number" id="ground" value="0" step="10"></div>
          <div class="field"><label><span data-i18n="margin"></span> <span class="unit">m</span></label><input type="number" id="margin" value="30" step="5"></div>
        </div>
        <div class="chk"><input type="checkbox" id="autoElev" checked><label for="autoElev" style="margin:0;font-weight:400" data-i18n="autoelev"></label></div>
      </section>

      <section class="card results">
        <div class="card-head"><span class="num">4</span><h2 data-i18n="res_h"></h2><span class="sub" id="legCount"></span></div>
        <div class="readout">
          <div class="cell arr" id="cArr"><div class="k" data-i18n="k_arr"></div><div class="v" id="vArr">—</div><div class="verdict" id="vVerdict"></div><div class="relief" id="vRelief"></div></div>
          <div class="cell"><div class="k" data-i18n="k_dist"></div><div class="v" id="vDist">—</div></div>
          <div class="cell"><div class="k" data-i18n="k_bear"></div><div class="v" id="vBear">—</div></div>
          <div class="cell"><div class="k" data-i18n="k_time"></div><div class="v" id="vTime">—</div></div>
          <div class="cell"><div class="k" data-i18n="k_gs"></div><div class="v" id="vGs">—</div></div>
          <div class="cell"><div class="k" data-i18n="k_drop"></div><div class="v" id="vDrop">—</div></div>
          <div class="cell wind"><div class="k" data-i18n="k_wc"></div><div class="v" id="vWc">—</div></div>
        </div>
        <div class="ptlist" id="ptList" style="display:none"></div>
        <div class="legs" id="legList" style="display:none"></div>
        <div class="btns">
          <button class="primary" id="share" data-i18n="share_btn"></button>
          <button id="kml">KML</button>
          <button id="reset" data-i18n="reset"></button>
        </div>
      </section>

      <section class="card">
        <div class="card-head"><span class="num">5</span><h2 data-i18n="ap_h"></h2><span class="sub mono" id="apAxis">—</span></div>
        <div class="chk" style="margin:0"><input type="checkbox" id="apOn"><label for="apOn" style="margin:0;font-weight:400" data-i18n="ap_on"></label></div>
        <div id="apOut" style="display:none;margin-top:9px">
          <div class="row3">
            <div class="field"><label><span data-i18n="lz_r"></span> <span class="unit">m</span></label><input type="number" id="lzR" value="50" step="5" min="5"></div>
            <div class="field"><label><span data-i18n="obs_h"></span> <span class="unit">m</span></label><input type="number" id="obsH" value="15" step="1" min="0"></div>
            <div class="field"><label><span data-i18n="side"></span></label><select id="apSide"><option value="left" data-i18n="side_l"></option><option value="right" data-i18n="side_r"></option></select></div>
          </div>
          <div class="gates" id="apGates"></div>
          <p id="apVerdict" style="display:none"></p>
          <p class="warn" id="apEntry" style="display:none"></p>
          <p class="est" id="apTerr" style="margin:6px 0 0"></p>
          <details style="margin-top:8px"><summary data-i18n="ap_help_sum"></summary><p class="est" data-i18n="ap_help"></p></details>
        </div>
      </section>

      <details class="footnote">
        <summary data-i18n="foot_sum"></summary>
        <p class="est" data-i18n="foot"></p>
      </details>
    </div>

    <div id="map">
      <div class="maptip" id="tip" data-i18n="tip_start"></div>
      <div id="profWrap">
        <div class="prof-head"><span class="t" data-i18n="prof_t"></span><span id="profStatus"></span><button id="profClose" title="×">×</button></div>
        <canvas id="prof"></canvas>
      </div>
      <button id="profToggle" data-i18n="prof_btn"></button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

      ap_terr_cut:"⛰ ✕ La pente du circuit coupe le relief",
      ap_help_sum:"Comment lire le circuit",
      ap_help:"La finale est alignée face au vent (ou dans l'axe du dernier leg par vent nul) et se termine au centre de la zone. Les hauteurs des portes sont en mètres au-dessus de la zone, en fourchette finesse planif → best : vise dedans, ajuste en finale. <b>Obstacles</b> = hauteur des arbres/maisons en bord de zone — aucune base mondiale d'obstacles n'existe, vérifie sur place ; ta marge (carte 3) s'y ajoute. Un roulement d'environ 15 m est inclus.",
      cal_done:"Finesse mesurée en vol.",
      wn_est:"Estimation best-glide — Flare ne publie pas de polaire. À calibrer.",
      wn_m16:"Taille 16 recalée sur tes vols GPS (v≈50 km/h, finesse ~6.5 réaliste / ~8 best). Autres tailles estimées.",
      wn_m18:"Taille 18 : finesse recalée sur tes vols GPS (~6.5). Autres tailles estimées.",
      wn_enb:"Ordre de grandeur d'un parapente EN-B.",
      wn_free:"Valeurs libres / mesurées."
    }
  };
  let lang=(localStorage.getItem("glidex_lang")||"en") in I18N ? (localStorage.getItem("glidex_lang")||"en") : "en";
  function T(k){
    let s=(I18N[lang][k]!==undefined?I18N[lang][k]:I18N.en[k]); if(s===undefined)return k;
    for(let i=1;i<arguments.length;i++)s=s.split("{"+(i-1)+"}").join(arguments[i]);
    return s;
  }
  function applyLang(){
    document.documentElement.lang=lang;
    document.title=T("title");
    document.querySelectorAll("[data-i18n]").forEach(el=>{el.innerHTML=T(el.dataset.i18n);});
    document.querySelectorAll("[data-i18n-ph]").forEach(el=>{el.placeholder=T(el.dataset.i18nPh);});
    $("langBtn").textContent = lang==="en" ? "FR" : "EN";
    const wk=$("wing")&&$("wing").value;
    if(wk&&WINGS[wk])$("wingEst").textContent=T("wn_"+WINGS[wk].note);
  }

  /* ---------- base de voiles ----------
     Tailles = officielles Flare (go-flare.com).
     f (finesse) & v (vit. best glide) = ESTIMATIONS (aucune polaire publiée). */
  const WINGS={
    flare_bandit:{name:"Flare Bandit",note:"m16",sizes:{
      10:{f:7.0,v:46},13:{f:7.5,v:45},16:{f:8.0,v:50},19:{f:8.3,v:43},22:{f:8.5,v:42}}},
    flare_moustache2:{name:"Flare Moustache 2",note:"est",sizes:{
      13:{f:6.5,v:45},15:{f:6.8,v:44},18:{f:7.2,v:43},22:{f:7.6,v:41},26:{f:7.9,v:39}}},
    flare_moustache:{name:"Flare Moustache 1",note:"m18",sizes:{
      15:{f:6.4,v:44},18:{f:6.5,v:43},20:{f:7.0,v:42},22:{f:7.2,v:41}}},
    paraglider_b:{name:"Paraglider EN-B",note:"enb",sizes:{"—":{f:9.0,v:38}}},
    custom:{name:"Custom",note:"free",sizes:{"—":{f:8.0,v:44}}}
  };

  function fillWings(){
    const w=$("wing");
    for(const k in WINGS){const o=document.createElement("option");o.value=k;o.textContent=WINGS[k].name;w.appendChild(o);}
    w.value="flare_bandit"; fillSizes();
  }
  function fillSizes(){
    const s=$("size"); s.innerHTML="";
    const sizes=WINGS[$("wing").value].sizes;
    for(const k in sizes){const o=document.createElement("option");o.value=k;o.textContent=k;s.appendChild(o);}
    if(sizes["16"])s.value="16"; applyWing();
  }
  function applyWing(){
    const wk=$("wing").value, d=WINGS[wk].sizes[$("size").value];
    if(d){ $("glide").value=d.f; $("glideMin").value=(d.f*0.8).toFixed(1); $("vspeed").value=d.v; }
    $("wingEst").textContent=T("wn_"+WINGS[wk].note);
    recompute();
  }

  /* ---------- carte ---------- */
  const map=L.map("map",{zoomControl:true}).setView([36.0143,-5.6044],14);
  const osm=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"});
  const sat=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"© Esri"});
  const topo=L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",{maxZoom:17,attribution:"© OpenTopoMap"});
  sat.addTo(map);
  L.control.layers({"Satellite":sat,"Plan (OSM)":osm,"Topo":topo},null,{position:"topright"}).addTo(map);

  /* ---------- route multi-points ---------- */
  let pts=[],markers=[],footBest=null,footCons=null,routeLine=null,windLine=null;
  function mkIcon(col,small){const s=small?13:18;return L.divIcon({className:"",html:
    `<div style="width:${s}px;height:${s}px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
     background:${col};border:2px solid #0c1311;box-shadow:0 0 0 2px ${col}55"></div>`,iconSize:[s,s],iconAnchor:[s/2,s]});}
  const greenIcon=mkIcon(getCSS('--ok')),redIcon=mkIcon(getCSS('--danger')),midIcon=mkIcon(getCSS('--signal'),true);

  function addPoint(ll,silent){
    pts.push(ll);
    const mk=L.marker(ll,{icon:redIcon,draggable:true}).addTo(map);
    mk.on("drag",ev=>{pts[markers.indexOf(mk)]=ev.latlng;recompute();});
    mk.on("dragend",()=>{if(markers.indexOf(mk)===markers.length-1)fetchGround();saveState();});
    mk.on("contextmenu",ev=>{if(ev.originalEvent)ev.originalEvent.preventDefault();removePoint(markers.indexOf(mk));});
    markers.push(mk); refreshIcons();
    if(!silent){
      if(pts.length===1)tip(T("tip_end"));
      else{tip("");fetchGround();}
      recompute(); saveState();
    }
  }
  function removePoint(i){
    if(i<0)return;
    map.removeLayer(markers[i]); markers.splice(i,1); pts.splice(i,1);
    refreshIcons(); if(pts.length>=2)fetchGround();
    recompute(); saveState();
  }
  function refreshIcons(){
    markers.forEach((m,i)=>m.setIcon(i===0?greenIcon:(i===markers.length-1?redIcon:midIcon)));
  }
  function renderPtList(){
    const el=$("ptList");
    if(!pts.length){el.style.display="none";el.innerHTML="";return;}
    el.style.display="block";
    el.innerHTML=pts.map((q,i)=>{
      const col=i===0?getCSS('--ok'):(i===pts.length-1?getCSS('--danger'):getCSS('--signal'));
      const lbl=i===0?T("start"):(i===pts.length-1?T("end"):"P"+i);
      return `<div class="pt" data-i="${i}"><span class="dot" style="background:${col}"></span>`+
        `<span class="lbl">${lbl}</span><span class="co">${q.lat.toFixed(4)}, ${q.lng.toFixed(4)}</span>`+
        `<button class="ptdel" data-del="${i}" title="Supprimer ce point">✕</button></div>`;
    }).join("");
  }
  $("ptList").addEventListener("click",e=>{
    const del=e.target.closest("[data-del]");
    if(del){removePoint(+del.dataset.del);return;}
    const row=e.target.closest("[data-i]");
    if(row)map.panTo(pts[+row.dataset.i]);
  });
  map.on("click",e=>addPoint(e.latlng));
  map.on("moveend",()=>{updateShareUrl();saveState();});
  function tip(t){const el=$("tip");if(!t){el.style.opacity=0;setTimeout(()=>el.style.display="none",300);}else{el.style.display="";el.style.opacity=1;el.textContent=t;}}

  /* ---------- géo ---------- */
  function enu(from,to){return{dE:(to.lng-from.lng)*111320*Math.cos(from.lat*D2R),dN:(to.lat-from.lat)*111320};}
  function offset(from,dE,dN){return[from.lat+dN/111320,from.lng+dE/(111320*Math.cos(from.lat*D2R))];}
  function bearing(from,to){
    const y=Math.sin((to.lng-from.lng)*D2R)*Math.cos(to.lat*D2R);
    const x=Math.cos(from.lat*D2R)*Math.sin(to.lat*D2R)-Math.sin(from.lat*D2R)*Math.cos(to.lat*D2R)*Math.cos((to.lng-from.lng)*D2R);
    return(Math.atan2(y,x)/D2R+360)%360;}

  /* ---------- physique ---------- */
  function readParams(){
    const g=Math.max(0.5,+$("glide").value||0);
    const gMin=Math.min(g,Math.max(0.5,+$("glideMin").value||g));
    const vx=Math.max(1,(+$("vspeed").value||0))/3.6;
    const alt=+$("alt").value||0,grd=+$("ground").value||0,mrg=+$("margin").value||0;
    const w=Math.max(0,(+$("wind").value||0))*KT;
    const wfrom=((+$("wdir").value||0)%360+360)%360,wtoward=(wfrom+180)%360;
    const uE=Math.sin(wtoward*D2R),uN=Math.cos(wtoward*D2R);
    const k=Math.min(vx>0?w/vx:0,0.985),dh=Math.max(0,alt-grd);
    return{g,gMin,vx,alt,grd,mrg,w,uE,uN,k,dh};
  }
  // renvoie R0 (rayon air = finesse×Δh), indépendant de la finesse
  function solveR0(dE,dN,p){
    const D=Math.hypot(dE,dN); if(D<1e-6)return{R0:0,wc:0,D:0};
    const pu=dE*p.uE+dN*p.uN,k=p.k;
    const disc=k*k*pu*pu+(1-k*k)*D*D;
    return{R0:(Math.sqrt(disc)-k*pu)/(1-k*k),wc:pu/D*p.w,D};
  }
  // route complète : chaque leg enchaîné, pertes cumulées
  function computeRoute(p){
    const legs=[];let cumB=0,cumC=0,totD=0,totT=0,wcW=0;
    for(let i=0;i+1<pts.length;i++){
      const {dE,dN}=enu(pts[i],pts[i+1]);
      const r=solveR0(dE,dN,p);
      const D=map.distance(pts[i],pts[i+1]);
      const dropB=r.R0/p.g,dropC=r.R0/p.gMin,t=r.R0/p.vx;
      cumB+=dropB;cumC+=dropC;totD+=D;totT+=t;wcW+=r.wc*D;
      legs.push({D,bear:bearing(pts[i],pts[i+1]),R0:r.R0,dropB,dropC,t,cumB,cumC});
    }
    return{legs,totD,totT,dropB:cumB,dropC:cumC,wc:totD>0?wcW/totD:0};
  }
  const fmtT=s=>{s=Math.round(s);return Math.floor(s/60)+"'"+String(s%60).padStart(2,"0")+'"';};
  const fmtD=m=>m<1000?Math.round(m)+" m":(m/1000).toFixed(2)+" km";

  function recompute(){
    const p=readParams();
    drawRose(((+$("wdir").value||0)%360+360)%360);
    $("windWarn").style.display = (p.w >= p.vx*0.985) ? "" : "none";
    renderPtList();

    if(pts.length){
      const draw=(f,layer,style)=>{
        const R0=f*p.dh,Cx=R0*p.k*p.uE,Cy=R0*p.k*p.uN,poly=[];
        for(let i=0;i<=72;i++){const a=i/72*2*Math.PI;poly.push(offset(pts[0],Cx+R0*Math.cos(a),Cy+R0*Math.sin(a)));}
        if(layer)layer.setLatLngs(poly); else layer=L.polygon(poly,style).addTo(map);
        return layer;
      };
      footBest=draw(p.g,footBest,{color:getCSS('--signal'),weight:1.2,dashArray:"4 5",fill:false});
      footCons=draw(p.gMin,footCons,{color:getCSS('--signal'),weight:1.5,fillColor:getCSS('--signal'),fillOpacity:0.12});
      const wl=Math.min(p.g*p.dh*0.45,600),wpts=[[pts[0].lat,pts[0].lng],offset(pts[0],p.uE*wl,p.uN*wl)];
      if(windLine)windLine.setLatLngs(wpts);else windLine=L.polyline(wpts,{color:getCSS('--wind'),weight:3,dashArray:"1 6",lineCap:"round"}).addTo(map);
    }

    updateShareUrl();

    if(pts.length<2){blank();renderApproach(null);scheduleTerrain();return;}
    const R=computeRoute(p);
    const aglBest=(p.alt-p.grd)-R.dropB, aglCons=(p.alt-p.grd)-R.dropC;
    const gs=R.totT>0?R.totD/R.totT:0;
    const reach=aglCons>=-0.5, safe=aglCons>=p.mrg;

    const lp=pts.map(q=>[q.lat,q.lng]);
    if(routeLine)routeLine.setLatLngs(lp).setStyle({color:reach?getCSS('--ok'):getCSS('--danger')});
    else routeLine=L.polyline(lp,{color:getCSS('--ok'),weight:2}).addTo(map);

    const c=$("cArr");c.className="cell arr "+(reach?"good":"bad");
    if(reach){
      $("vArr").innerHTML=Math.round(aglCons)+'–'+Math.round(aglBest)+' <small>'+T("msol")+'</small>';
      $("vVerdict").innerHTML = safe
        ? T("v_ok",p.mrg)
        : T("v_bg",Math.round(aglCons),p.mrg);
      $("vVerdict").style.color = safe?getCSS('--ok'):getCSS('--signal');
    } else {
      $("vArr").innerHTML=T("v_short",Math.round(-aglCons),Math.round(-aglBest));
      $("vVerdict").innerHTML=T("v_out");
      $("vVerdict").style.color=getCSS('--danger');
    }
    $("vDist").innerHTML=fmtD(R.totD).replace(" ",' <small>')+'</small>';
    $("vBear").innerHTML=Math.round(R.legs[0].bear)+' <small>°</small>';
    $("vTime").innerHTML=fmtT(R.totT);
    $("vGs").innerHTML=(gs*3.6).toFixed(0)+' <small>km/h</small>';
    $("vDrop").innerHTML=Math.round(R.dropB)+'–'+Math.round(R.dropC)+' <small>m</small>';
    const wcKt=R.wc/KT;$("vWc").innerHTML=(wcKt>=0?'+':'')+wcKt.toFixed(1)+' <small>kt</small>';

    $("legCount").textContent=R.legs.length>1?R.legs.length+" legs":"";
    const ll=$("legList");
    if(R.legs.length>1){
      ll.style.display="";
      ll.innerHTML=R.legs.map((lg,i)=>{
        const hC=Math.round((p.alt-p.grd)-lg.cumC),hB=Math.round((p.alt-p.grd)-lg.cumB);
        return `<div><span><b>L${i+1}</b> ${fmtD(lg.D)} · ${Math.round(lg.bear)}°</span><span>${T("left_t",hC,hB)}</span></div>`;
      }).join("");
    } else ll.style.display="none";

    renderApproach(reach?aglCons:null);
    scheduleTerrain();
  }
  function blank(){["vDist","vBear","vTime","vGs","vDrop","vWc"].forEach(i=>$(i).textContent="—");
    $("cArr").className="cell arr";$("vArr").textContent="—";$("vVerdict").textContent="";$("vRelief").textContent="";
    $("legCount").textContent="";$("legList").style.display="none";
    if(routeLine){map.removeLayer(routeLine);routeLine=null;}
    $("profWrap").style.display="none";$("profToggle").style.display="none";}

  /* ---------- profil de terrain le long de la route ---------- */
  let terr=null, terrTimer=null, terrPending=null, profClosed=false;
  const sigOf=()=>pts.map(q=>q.lat.toFixed(4)+","+q.lng.toFixed(4)).join(";");
  function scheduleTerrain(){
    clearTimeout(terrTimer);
    if(pts.length<2){terr=null;return;}
    const sig=sigOf();
    if(terr&&terr.sig===sig){renderProfile();return;}
    $("profStatus").textContent="…";$("profStatus").style.color="#7f958d";
    terrTimer=setTimeout(fetchTerrain,600);
  }
  function fetchTerrain(){
    const sig=sigOf(); if(terrPending===sig)return; terrPending=sig;
    // échantillons à intervalle régulier le long des legs
    const Dl=[];let tot=0;
    for(let i=0;i+1<pts.length;i++){const d=map.distance(pts[i],pts[i+1]);Dl.push(d);tot+=d;}
    if(tot<10){terrPending=null;return;}
    const N=Math.max(20,Math.min(80,Math.round(tot/50)));
    const lats=[],lngs=[],ds=[];
    for(let j=0;j<N;j++){
      const d=j/(N-1)*tot;let acc=0,i=0;
      while(i<Dl.length-1&&acc+Dl[i]<d){acc+=Dl[i];i++;}
      const f=Dl[i]>0?(d-acc)/Dl[i]:0;
      lats.push((pts[i].lat+(pts[i+1].lat-pts[i].lat)*f).toFixed(5));
      lngs.push((pts[i].lng+(pts[i+1].lng-pts[i].lng)*f).toFixed(5));
      ds.push(d);
    }
    fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats.join(",")}&longitude=${lngs.join(",")}`)
      .then(r=>r.json())
      .then(j=>{
        terrPending=null;
        if(!j||!j.elevation||j.elevation.length!==N)throw 0;
        if(sig!==sigOf())return; // la route a bougé entre temps
        terr={sig,d:ds,z:j.elevation,tot,Dl};
        renderProfile();
      })
      .catch(()=>{terrPending=null;$("profStatus").textContent=T("elev_unavail");});
  }
  function pilotAlt(d,p,legs,Dl,useCons){
    let acc=0,i=0;
    while(i<Dl.length-1&&acc+Dl[i]<d){acc+=Dl[i];i++;}
    const f=Dl[i]>0?Math.min(1,(d-acc)/Dl[i]):0;
    const prev=i>0?(useCons?legs[i-1].cumC:legs[i-1].cumB):0;
    const drop=useCons?legs[i].dropC:legs[i].dropB;
    return p.alt-prev-f*drop;
  }
  function renderProfile(){
    if(pts.length<2||!terr||terr.sig!==sigOf())return;
    const p=readParams(),R=computeRoute(p);
    const wrap=$("profWrap"),cv=$("prof");
    if(!profClosed){wrap.style.display="block";$("profToggle").style.display="none";}
    else{wrap.style.display="none";$("profToggle").style.display="block";}

    // dégagement mini (finesse planif), en ignorant les 3 % initiaux (départ posé au sol)
    let minClear=Infinity,minAt=0,crossAt=-1;
    const consLine=terr.d.map(d=>pilotAlt(d,p,R.legs,terr.Dl,true));
    const bestLine=terr.d.map(d=>pilotAlt(d,p,R.legs,terr.Dl,false));
    terr.d.forEach((d,j)=>{
      if(d<terr.tot*0.03)return;
      const cl=consLine[j]-terr.z[j];
      if(cl<minClear){minClear=cl;minAt=d;}
      if(cl<0&&crossAt<0)crossAt=d;
    });
    const st=$("profStatus"),vr=$("vRelief");
    if(crossAt>=0){
      st.textContent=T("st_cut",fmtD(crossAt));st.style.color=getCSS('--danger');
      vr.textContent=T("vr_cut",fmtD(crossAt));vr.style.color=getCSS('--danger');
    }else if(minClear<p.mrg){
      st.textContent=T("st_low",Math.round(minClear),fmtD(minAt));st.style.color=getCSS('--signal');
      vr.textContent=T("vr_low",Math.round(minClear),fmtD(minAt));vr.style.color=getCSS('--signal');
    }else{
      st.textContent=T("st_clear",Math.round(minClear));st.style.color=getCSS('--ok');
      vr.textContent="";
    }

    // dessin
    const dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=cv.clientHeight;
    cv.width=W*dpr;cv.height=H*dpr;
    const g=cv.getContext("2d");g.scale(dpr,dpr);g.clearRect(0,0,W,H);
    const PL=36,PR=6,PT=6,PB=14,iw=W-PL-PR,ih=H-PT-PB;
    let zmin=Math.min(...terr.z,...consLine),zmax=Math.max(...terr.z,p.alt);
    const pad=(zmax-zmin)*0.08+5;zmin-=pad;zmax+=pad;
    const X=d=>PL+d/terr.tot*iw, Y=z=>PT+(1-(z-zmin)/(zmax-zmin))*ih;
    // grille + labels alt
    g.font="9px "+getComputedStyle(document.body).getPropertyValue("--mono");
    g.fillStyle="#5d6f67";g.strokeStyle="#24382f";g.lineWidth=1;
    for(let i=0;i<=2;i++){const z=zmin+(zmax-zmin)*i/2;const y=Y(z);
      g.beginPath();g.moveTo(PL,y);g.lineTo(W-PR,y);g.stroke();
      g.fillText(Math.round(z)+" m",2,y+3);}
    // terrain
    g.beginPath();g.moveTo(X(0),Y(terr.z[0]));
    terr.d.forEach((d,j)=>g.lineTo(X(d),Y(terr.z[j])));
    g.lineTo(X(terr.tot),H-PB);g.lineTo(X(0),H-PB);g.closePath();
    g.fillStyle="rgba(74,97,87,.45)";g.fill();
    g.beginPath();terr.d.forEach((d,j)=>{j?g.lineTo(X(d),Y(terr.z[j])):g.moveTo(X(d),Y(terr.z[j]));});
    g.strokeStyle="#6e8a7d";g.lineWidth=1.4;g.stroke();
    // étapes (verticales)
    let acc=0;g.strokeStyle="#3a4f45";g.setLineDash([2,3]);
    for(let i=0;i<terr.Dl.length-1;i++){acc+=terr.Dl[i];const x=X(acc);
      g.beginPath();g.moveTo(x,PT);g.lineTo(x,H-PB);g.stroke();}
    g.setLineDash([]);
    // lignes pilote : best (pointillé) puis planif (pleine)
    g.beginPath();terr.d.forEach((d,j)=>{j?g.lineTo(X(d),Y(bestLine[j])):g.moveTo(X(d),Y(bestLine[j]));});
    g.strokeStyle=getCSS('--signal');g.lineWidth=1.2;g.setLineDash([4,4]);g.stroke();g.setLineDash([]);
    g.beginPath();terr.d.forEach((d,j)=>{j?g.lineTo(X(d),Y(consLine[j])):g.moveTo(X(d),Y(consLine[j]));});
    g.strokeStyle=getCSS('--signal');g.lineWidth=2;g.stroke();
    // zone de collision en rouge
    if(crossAt>=0){
      g.beginPath();let started=false;
      terr.d.forEach((d,j)=>{if(consLine[j]<terr.z[j]){const x=X(d);if(!started){g.moveTo(x,Y(terr.z[j]));started=true;}else g.lineTo(x,Y(terr.z[j]));}});
      g.strokeStyle=getCSS('--danger');g.lineWidth=3;g.stroke();
    }
    // labels distance
    g.fillStyle="#5d6f67";
    g.fillText("0",PL,H-3);
    const kmTxt=(terr.tot/1000).toFixed(1)+" km";
    g.fillText(kmTxt,W-PR-g.measureText(kmTxt).width,H-3);
  }
  $("profClose").addEventListener("click",()=>{profClosed=true;renderProfile();});
  $("profToggle").addEventListener("click",()=>{profClosed=false;renderProfile();});
  window.addEventListener("resize",()=>renderProfile());

  /* ---------- altitude sol auto (dernier point) ---------- */
  let elevTimer=null;
  function fetchGround(){
    if(!$("autoElev").checked||pts.length<2)return;
    const last=pts[pts.length-1];

  /* ---------- approche & atterrissage ----------
     Circuit en U (vent arrière → base → finale face au vent) terminant au CENTRE de la zone.
     Hauteurs de porte = perte de plané par leg via solveR0 (vent inclus), en fourchette planif→best.
     Espace requis = (obstacles + marge) × finesse-sol en finale + roulement. */
  const AP_ROLL=15; // roulement au sol (m)
  let apLayers=[], apTerrTimer=null, apTerrSig=null, apTerrPend=null;
  function clearApLayers(){apLayers.forEach(l=>map.removeLayer(l));apLayers=[];}
  function gatePill(ll,txt){return L.marker(ll,{interactive:false,icon:L.divIcon({className:"",iconSize:[0,0],html:`<div class="gate">${txt}</div>`})});}
  function computeApproach(p){
    const C=pts[pts.length-1];
    const R=Math.max(5,+$("lzR").value||50);
    const hObs=Math.max(0,+$("obsH").value||0);
    const clearNeed=hObs+p.mrg;
    // axe de finale : face au vent ; par vent quasi nul, dans l'axe du dernier leg
    let axis;
    if(p.w<0.26&&pts.length>=2)axis=bearing(pts[pts.length-2],C);
    else axis=((+$("wdir").value||0)%360+360)%360;
    const uE=Math.sin(axis*D2R),uN=Math.cos(axis*D2R);
    const left=$("apSide").value!=="right";
    const bh=(axis+(left?90:270))%360; // cap de l'étape de base
    const bE=Math.sin(bh*D2R),bN=Math.cos(bh*D2R);
    // finesse-sol en finale (face au vent) pour chaque finesse air
    const rf=solveR0(uE*1000,uN*1000,p);
    const fsolB=1000*p.g/rf.R0, fsolC=1000*p.gMin/rf.R0;
    const needB=clearNeed*fsolB+AP_ROLL, needC=clearNeed*fsolC+AP_ROLL;
    // géométrie du circuit
    const Lf=R+Math.max(150,Math.ceil(needB/10)*10), Lb=Math.max(100,R+30), Ld=Lf;
    const F=L.latLng(offset(C,-uE*Lf,-uN*Lf));      // virage de finale
    const PB=L.latLng(offset(F,-bE*Lb,-bN*Lb));     // virage de base
    const E=L.latLng(offset(PB,uE*Ld,uN*Ld));       // entrée vent arrière (travers du centre)
    const X=L.latLng(offset(C,-uE*R,-uN*R));        // bord de zone côté finale
    // pertes par leg (fourchette best / planif)
    const leg=(dE,dN)=>{const r=solveR0(dE,dN,p);return[r.R0/p.g,r.R0/p.gMin];};
    const [fB,fC]=leg(uE*Lf,uN*Lf), [bB2,bC2]=leg(bE*Lb,bN*Lb), [dB,dC]=leg(-uE*Ld,-uN*Ld);
    return {C,R,axis,E,PB,F,X,clearNeed,hObs,needB,needC,Lf,Lb,
      HfB:fB,HfC:fC, HbB:fB+bB2,HbC:fC+bC2, HeB:fB+bB2+dB,HeC:fC+bC2+dC,
      hEdgeB:R/fsolB,hEdgeC:R/fsolC};
  }
  function setApMsg(cls,msg){const v=$("apVerdict");v.className=cls;v.innerHTML=msg;v.style.display="";}
  function renderApproach(routeAgl){
    clearApLayers();
    const on=$("apOn").checked,out=$("apOut");
    if(!on){out.style.display="none";$("apAxis").textContent="—";apTerrSig=null;return;}
    out.style.display="";
    if(!pts.length){$("apGates").innerHTML="";setApMsg("warn",T("kml_alert"));
      $("apTerr").textContent="";$("apEntry").style.display="none";$("apAxis").textContent="—";return;}
    const p=readParams();
    if(p.w>=p.vx*0.985){$("apGates").innerHTML="";setApMsg("warn",T("ap_wind"));
      $("apTerr").textContent="";$("apEntry").style.display="none";$("apAxis").textContent="—";return;}
    const A=computeApproach(p);
    $("apAxis").innerHTML=Math.round(A.axis)+"° <small>"+T("ap_final")+"</small>";
    // carte : zone + circuit + portes
    const okc=getCSS('--ok');
    apLayers.push(L.circle(A.C,{radius:A.R,color:okc,weight:1.5,fillColor:okc,fillOpacity:.10,interactive:false}));
    apLayers.push(L.polyline([A.E,A.PB,A.F,A.C],{color:"#f5f8f6",weight:2,dashArray:"6 6",interactive:false}));
    const br=(hi,lo)=>Math.round(hi)+"–"+Math.round(lo);
    apLayers.push(gatePill(A.E,T("gs_dw")+" "+br(A.HeC,A.HeB)));
    apLayers.push(gatePill(A.PB,T("gs_base")+" "+br(A.HbC,A.HbB)));
    apLayers.push(gatePill(A.F,T("gs_final")+" "+br(A.HfC,A.HfB)));
    apLayers.push(gatePill(A.X,T("gs_obs")+" ≥"+Math.round(A.clearNeed)));
    apLayers.forEach(l=>l.addTo(map));
    // panneau : portes
    const rows=[
      [T("g_dw"),br(A.HeC,A.HeB)+" "+T("msol")],
      [T("g_base"),br(A.HbC,A.HbB)+" "+T("msol")],
      [T("g_final"),br(A.HfC,A.HfB)+" "+T("msol")],
      [T("g_obs"),br(A.hEdgeC,A.hEdgeB)+" "+T("msol")+" · ≥ "+Math.round(A.clearNeed)+" m"],
      [T("g_td"),"0 "+T("msol")]
    ];
    $("apGates").innerHTML=rows.map(r=>`<div><b>${r[0]}</b><span class="val">${r[1]}</span></div>`).join("");
    // verdict d'espace
    if(A.R>=A.needB)setApMsg("okmsg",T("ap_ok",Math.round(A.needB),Math.round(A.R)));
    else if(A.R>=A.needC)setApMsg("warn",T("ap_steep",Math.round(A.needB-A.R)));
    else if(2*A.R>=A.needC)setApMsg("warn",T("ap_shift",Math.round(A.needC-A.R)));
    else setApMsg("warn",T("ap_small",Math.round(A.hObs),Math.ceil(A.needC/10)*10));
    // cohérence avec l'arrivée de la route
    const en=$("apEntry");
    if(routeAgl!=null&&routeAgl<A.HeC){en.style.display="";en.innerHTML=T("ap_entry_low",Math.round(routeAgl),Math.round(A.HeC));}
    else en.style.display="none";
    scheduleApTerrain(A,p);
  }
  function scheduleApTerrain(A,p){
    const sig=[A.C.lat.toFixed(4),A.C.lng.toFixed(4),Math.round(A.axis),A.Lf,A.Lb,Math.round(p.grd),Math.round(A.HeB),Math.round(A.clearNeed),lang].join("|");
    if(apTerrSig===sig)return;
    clearTimeout(apTerrTimer);
    $("apTerr").textContent="…";$("apTerr").style.color="";
    apTerrTimer=setTimeout(()=>fetchApTerrain(A,p,sig),700);
  }
  function fetchApTerrain(A,p,sig){
    if(apTerrPend===sig)return;apTerrPend=sig;
    // échantillons le long du circuit ; ligne pilote = hauteurs best glide (la plus basse = pire cas)
    const path=[A.E,A.PB,A.F,A.C],hB=[A.HeB,A.HbB,A.HfB,0];
    const Dl=[];let tot=0;
    for(let i=0;i<3;i++){const d=map.distance(path[i],path[i+1]);Dl.push(d);tot+=d;}
    const N=24,lats=[],lngs=[],hs=[],ds=[];
    for(let j=0;j<N;j++){
      const d=j/(N-1)*tot;let acc=0,i=0;
      while(i<2&&acc+Dl[i]<d){acc+=Dl[i];i++;}
      const f=Dl[i]>0?(d-acc)/Dl[i]:0;
      lats.push((path[i].lat+(path[i+1].lat-path[i].lat)*f).toFixed(5));
      lngs.push((path[i].lng+(path[i+1].lng-path[i].lng)*f).toFixed(5));
      hs.push(hB[i]+(hB[i+1]-hB[i])*f);ds.push(d);
    }
    fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats.join(",")}&longitude=${lngs.join(",")}`)
      .then(r=>r.json()).then(j=>{
        apTerrPend=null;
        if(!j||!j.elevation||j.elevation.length!==N)throw 0;
        apTerrSig=sig;
        let mn=Infinity;
        for(let k=0;k<N;k++){
          if(tot-ds[k]<=A.R)continue; // à l'intérieur de la zone : on touche, normal
          const cl=p.grd+hs[k]-j.elevation[k];
          if(cl<mn)mn=cl;
        }
        const el=$("apTerr");
        if(mn<0){el.textContent=T("ap_terr_cut");el.style.color=getCSS('--danger-ink');}
        else if(mn<A.clearNeed){el.textContent=T("ap_terr_low",Math.round(mn));el.style.color=getCSS('--signal-ink');}
        else{el.textContent=T("ap_terr_ok",mn===Infinity?"—":Math.round(mn));el.style.color=getCSS('--ok-ink');}
      }).catch(()=>{apTerrPend=null;$("apTerr").textContent=T("elev_unavail");});
  }

  /* ---------- partage & persistance ---------- */
  function stateObj(){
    return{w:$("wing").value,s:$("size").value,f:$("glide").value,fm:$("glideMin").value,vs:$("vspeed").value,
      wd:$("wdir").value,ws:$("wind").value,a:$("alt").value,g:$("ground").value,m:$("margin").value,
      ae:$("autoElev").checked?1:0,ap:$("apOn").checked?1:0,lr:$("lzR").value,oh:$("obsH").value,as:$("apSide").value,
      l:lang,p:pts.map(q=>[+q.lat.toFixed(5),+q.lng.toFixed(5)])};
  }
  function updateShareUrl(){
    const o=stateObj(),q=new URLSearchParams();
    q.set("w",o.w);q.set("s",o.s);q.set("f",o.f);q.set("fm",o.fm);q.set("vs",o.vs);
    q.set("wd",o.wd);q.set("ws",o.ws);q.set("a",o.a);q.set("g",o.g);q.set("m",o.m);q.set("ae",o.ae);q.set("l",o.l);
    q.set("ap",o.ap);q.set("lr",o.lr);q.set("oh",o.oh);q.set("as",o.as);
    if(o.p.length)q.set("p",o.p.map(x=>x[0]+"~"+x[1]).join("_"));
    const c=map.getCenter();
    q.set("c",c.lat.toFixed(5)+"~"+c.lng.toFixed(5));q.set("z",map.getZoom());
    history.replaceState(null,"","#"+q.toString());
  }
  let saveTimer=null;
  function saveState(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      const o=stateObj();const c=map.getCenter();
      o.c=[+c.lat.toFixed(5),+c.lng.toFixed(5)];o.z=map.getZoom();
      try{localStorage.setItem(LS_KEY,JSON.stringify(o));}catch(e){}
    },400);
  }
  function loadState(){
    const h=new URLSearchParams(INIT_HASH.slice(1));
    if(h.has("p")||h.has("f")){
      const o={w:h.get("w"),s:h.get("s"),f:h.get("f"),fm:h.get("fm"),vs:h.get("vs"),wd:h.get("wd"),ws:h.get("ws"),
        a:h.get("a"),g:h.get("g"),m:h.get("m"),ae:h.get("ae"),ap:h.get("ap"),lr:h.get("lr"),oh:h.get("oh"),as:h.get("as"),
        l:h.get("l"),p:[]};
      if(h.get("p"))o.p=h.get("p").split("_").map(s=>s.split("~").map(Number)).filter(x=>x.length===2&&isFinite(x[0])&&isFinite(x[1]));
      if(h.get("c")){const cc=h.get("c").split("~").map(Number);if(cc.length===2&&isFinite(cc[0])&&isFinite(cc[1]))o.c=cc;}
      if(h.get("z")&&isFinite(+h.get("z")))o.z=+h.get("z");
      return o;
    }
    try{const s=localStorage.getItem(LS_KEY);if(s)return JSON.parse(s);}catch(e){}
    return null;
  }
  function applyState(st){
    if(st.w&&WINGS[st.w]){$("wing").value=st.w;fillSizes();}
    if(st.s!=null&&WINGS[$("wing").value].sizes[st.s]!==undefined){$("size").value=st.s;applyWing();}
    if(st.f!=null)$("glide").value=st.f;
    if(st.fm!=null)$("glideMin").value=st.fm;
    if(st.vs!=null)$("vspeed").value=st.vs;
    if(st.wd!=null)$("wdir").value=st.wd;
    if(st.ws!=null)$("wind").value=st.ws;
    if(st.a!=null)$("alt").value=st.a;
    if(st.g!=null)$("ground").value=st.g;
    if(st.m!=null)$("margin").value=st.m;
    if(st.ae!=null)$("autoElev").checked=!!+st.ae;
    if(st.ap!=null)$("apOn").checked=!!+st.ap;
    if(st.lr!=null)$("lzR").value=st.lr;
    if(st.oh!=null)$("obsH").value=st.oh;
    if(st.as==="left"||st.as==="right")$("apSide").value=st.as;
    (st.p||[]).forEach(x=>addPoint(L.latLng(x[0],x[1]),true));
    if(st.c&&st.z!=null)map.setView(st.c,st.z);
    else if(pts.length>=2)map.fitBounds(L.latLngBounds(pts),{padding:[60,60]});
    else if(pts.length===1)map.setView(pts[0],14);
    if(pts.length){tip("");}
    recompute();
  }

  /* ---------- KML ---------- */
  $("kml").addEventListener("click",()=>{
    if(!pts.length){alert(T("kml_alert"));return;}
    const p=readParams(),R0=p.gMin*p.dh,Cx=R0*p.k*p.uE,Cy=R0*p.k*p.uN;
    let ring="";for(let i=0;i<=72;i++){const a=i/72*2*Math.PI;const ll=offset(pts[0],Cx+R0*Math.cos(a),Cy+R0*Math.sin(a));ring+=ll[1].toFixed(6)+","+ll[0].toFixed(6)+",0 ";}
    const dwn=offset(pts[0],p.uE*R0*(1+p.k),p.uN*R0*(1+p.k));
    const wpts=pts.map((q,i)=>`<Placemark><name>${i===0?"Depart":"P"+i}</name><Point><coordinates>${q.lng.toFixed(6)},${q.lat.toFixed(6)},0</coordinates></Point></Placemark>`).join("\n");
    const route=pts.length>=2?`<Placemark><name>Route</name><LineString><coordinates>${pts.map(q=>q.lng.toFixed(6)+","+q.lat.toFixed(6)+",0").join(" ")}</coordinates></LineString></Placemark>`:"";
    const kml=`<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2"><Document>
<name>Plane ${Math.round(p.dh)}m finesse ${p.gMin} (planif) vent ${$("wind").value}kt</name>
<Style id="c"><LineStyle><color>ff3da2f2</color><width>2</width></LineStyle><PolyStyle><color>553da2f2</color></PolyStyle></Style>
${wpts}
${route}
<Placemark><name>Max sous le vent (~${(R0*(1+p.k)/1000).toFixed(1)} km)</name><Point><coordinates>${dwn[1].toFixed(6)},${dwn[0].toFixed(6)},0</coordinates></Point></Placemark>
<Placemark><name>Zone atteignable (planif)</name><styleUrl>#c</styleUrl><Polygon><outerBoundaryIs><LinearRing><coordinates>${ring.trim()}</coordinates></LinearRing></outerBoundaryIs></Polygon></Placemark>
</Document></kml>`;
    const url=URL.createObjectURL(new Blob([kml],{type:"application/vnd.google-earth.kml+xml"}));
    const a=document.createElement("a");a.href=url;a.download="glidex.kml";a.click();setTimeout(()=>URL.revokeObjectURL(url),1500);
  });

  $("reset").addEventListener("click",()=>{
    markers.forEach(m=>map.removeLayer(m));
    [footBest,footCons,routeLine,windLine].forEach(l=>l&&map.removeLayer(l));
    pts=[];markers=[];footBest=footCons=routeLine=windLine=null;terr=null;blank();
    $("tip").style.display="";$("tip").style.opacity=1;$("tip").textContent=T("tip_start");
    recompute();saveState();
  });

  function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

  $("wing").addEventListener("change",()=>{fillSizes();saveState();});
  $("size").addEventListener("change",()=>{applyWing();saveState();});
  ["glide","glideMin","vspeed","wind","wdir","alt","ground","margin","lzR","obsH"].forEach(i=>$(i).addEventListener("input",()=>{recompute();saveState();}));
  $("autoElev").addEventListener("change",()=>{fetchGround();saveState();});
  ["apOn","apSide"].forEach(i=>$(i).addEventListener("change",()=>{recompute();saveState();}));

  /* ---------- init ---------- */
  fillWings();
  const st=loadState();
  if(st&&st.l&&I18N[st.l])lang=st.l;
  applyLang();
  if(st&&(st.p&&st.p.length||st.f)){
    applyState(st);
  }else{
    addPoint(L.latLng(36.0143,-5.6044),true);
    addPoint(L.latLng(36.0143,-5.59885),true);
    fetchGround();recompute();tip("");
  }
})();
</script>
</body>
</html>
